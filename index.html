<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSF Team Messenger</title>
    <link rel="stylesheet" href="chat.css">
</head>
<body>
    <div class="chat-app">
        <div class="chat-header">
            <div class="status-dot"></div>
            <h2>Cyber Sentinel Force (CSF)</h2>
            <span>Secure Operations</span>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="message received">
                <span class="user">System:</span>
                Welcome to CSF Secure Hub. All communications are encrypted.
            </div>
        </div>

        <div class="input-area">
            <label for="file-upload" class="attach-btn">📎</label>
            <input type="file" id="file-upload" style="display:none;" onchange="handleFileUpload()">
            
            <input type="text" id="msg-input" placeholder="Type intelligence...">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</body>
              </html>
